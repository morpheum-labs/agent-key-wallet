name: rainbow_flutter
description: Rainbow-inspired multi-chain crypto wallet (Flutter, Clean Architecture).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.0.0
  flutter_secure_storage: ^9.2.2
  equatable: ^2.0.7
  go_router: ^14.6.2
  get_it: ^8.0.3
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  bip39: ^1.0.6
  bip32: ^2.0.0
  web3dart: ^2.7.3
  convert: ^3.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
